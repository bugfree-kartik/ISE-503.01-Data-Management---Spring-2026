services:
  # ── Express API ─────────────────────────────────────────────────────
  - type: web
    name: sbu-dining-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sbu-dining-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production

  # ── React Frontend ──────────────────────────────────────────────────
  - type: web
    name: sbu-dining-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://sbu-dining-api.onrender.com

# ── PostgreSQL Database ─────────────────────────────────────────────
databases:
  - name: sbu-dining-db
    databaseName: sbu_dining
    plan: free
